mode: BACKTEST

backtest:
  csvPath: data/historical/BTCUSDT-1h.csv
  symbol: BTCUSDT
  timeframe: 1h
  strategy:
    name: ema_cross
    parameters:
      shortEma: 3
      longEma: 7
  portfolio:
    initialCash: 10000.0

paper:
  bot:
    botId: btcusdt-paper-testnet
    botVersion: v1
    symbol: BTCUSDT
    timeframe: 1m
  execution:
    exchange: BINANCE_SPOT_TESTNET
    orderMode: VALIDATE_ONLY
    tickIntervalMillis: 10000
    initialCash: 1000.0
    orderQuantity: 0.0001
  actionSource:
    strategyName: queued_actions
    actions:
      - BUY
      - HOLD
      - SELL
  binance:
    apiKeyEnv: BINANCE_TESTNET_API_KEY
    secretKeyEnv: BINANCE_TESTNET_SECRET_KEY
    recvWindowMillis: 15000

reporting:
  prettyPrint: true
  includeNotes: true

logging:
  lifecycleEvents: true
